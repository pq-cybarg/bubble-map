0 9px;white-space:nowrap;font-weight:400">Persons</a><a href="bubblemap.html" style="color:#1f4e79;text-decoration:none;margin:0 9px;white-space:nowrap;font-weight:400">Bubble Map</a><a href="globe.html" style="color:#1f4e79;text-decoration:none;margin:0 9px;white-space:nowrap;font-weight:400">Globe</a><a href="methodology.html" style="color:#1f4e79;text-decoration:none;margin:0 9px;white-space:nowrap;font-weight:400">Methodology</a><a href="glossary.html" style="color:#7b2d26;text-decoration:none;margin:0 9px;white-space:nowrap;font-weight:700">Glossary</a><a href="https://github.com/pq-cybarg/bubble-map" style="color:#1f4e79;text-decoration:none;margin:0 9px;white-space:nowrap;font-weight:400">Source ↗</a></div><main><h1>Glossary</h1><p class=muted>Plain-language definitions of the technical terms used across the project. Type to search — fuzzy (typo-tolerant) matching on term, aliases and definition; the list updates as you type.</p><input id=gq type=search autocomplete=off placeholder="Search terms… (e.g. ratchet, HTM, harvest now, Sybil, OER)"><div id=gmeta></div><dl id=glist></dl></main>
<script>
const G=[
{t:"Circular core (strongly-connected component, SCC)",c:"proof",a:["scc","circular core","strongly connected"],d:"A set of firms where money can flow from each to every other and back. The formal definition of 'circular'; here, the group of AI firms funding one another (core = 12)."},
{t:"Vendor financing",c:"finance",a:["vendor financing","seller financing"],d:"When a seller funds its own customer so the customer can buy from it (a chipmaker investing in a startup that then buys its chips). Can inflate apparent demand; the dotcom analogue."},
{t:"Cancelable edge",c:"proof",a:["cancelable","cancellable"],d:"A funding/contract link either party can terminate on short notice. The model separates the core that survives only via cancelable deals (e.g. SpaceX) from the robust core (11)."},
{t:"Backwardation / contango",c:"commodities",a:["backwardation","contango"],d:"Backwardation = you pay more now than for later delivery (physical tightness). Contango = the opposite (ample supply / storage demand)."},
{t:"Registered vs eligible (COMEX)",c:"commodities",a:["registered","eligible","comex"],d:"Registered metal is available for delivery against futures; eligible metal is vaulted but not pledged. A high paper-claims-to-registered ratio signals fragility."},
{t:"Owners' Equivalent Rent (OER)",c:"macro-data",a:["oer","owners equivalent rent"],d:"The CPI's estimate of what a homeowner would pay to rent their own home. ~26% of CPI, imputed from rent surveys (not home prices), and it lags the market by ~a year."},
{t:"ALNRI / ZORI / New Tenant Rent Index",c:"macro-data",a:["alnri","zori","new tenant rent","ntri"],d:"Market-rent gauges (Apartment List, Zillow, BLS's own new-lease index) tracking new-lease rents. They lead official CPI shelter by ~12-16 months."},
{t:"Equity method",c:"finance",a:["equity method"],d:"An accounting rule where an investor books its share of an investee's profit or loss. Microsoft books a share of OpenAI's losses this way."},
{t:"Remaining Performance Obligations (RPO)",c:"finance",a:["rpo","remaining performance obligations","backlog"],d:"Contracted future revenue not yet delivered — a backlog. Oracle's ~$455B RPO (Q1 FY26) is largely promised cloud capacity for OpenAI/Stargate."},
{t:"Birth-death model",c:"macro-data",a:["birth death model","birth-death"],d:"A BLS model estimating jobs at newly-formed businesses. When it over-estimates, payrolls get revised down later (it drove ~half the 2024-25 downward revisions)."},
{t:"Benchmark revision (QCEW)",c:"macro-data",a:["benchmark revision","qcew"],d:"An annual correction of monthly jobs estimates to near-complete tax records. The Sep-2025 correction cut ~911,000 jobs."},
{t:"U-3 vs U-6",c:"macro-data",a:["u3","u6","u-3","u-6","unemployment"],d:"U-3 is the headline unemployment rate; U-6 also counts discouraged + involuntarily part-time workers (8.1% vs 4.3%, May 2026), capturing more underemployment."},
{t:"CPI vs PCE",c:"macro-data",a:["cpi","pce","inflation"],d:"Two inflation gauges with different weights; PCE (the Fed's target) usually reads ~0.3-0.4pp below CPI."},
{t:"Hedonic adjustment",c:"macro-data",a:["hedonic","quality adjustment"],d:"A method that lowers measured prices to account for quality gains (a faster computer at the same price counts as a price cut). Net effect on CPI is small and direction-ambiguous."},
{t:"R-CPI-U-RS",c:"macro-data",a:["rcpiurs","research series","cpi-u-rs"],d:"BLS's research series applying today's CPI methods backward in time — the credible tool to bound the methodology gap (~0.45pp/yr historically, smaller now)."},
{t:"TIPS / COLA",c:"macro-data",a:["tips","cola"],d:"TIPS are Treasury bonds whose payments rise with CPI; COLA is the CPI-linked annual Social-Security raise. Both make a lower measured CPI cheaper for the government."},
{t:"Hard-money lens (gold/silver)",c:"macro-data",a:["gold lens","gold oz","silver oz","gold/silver ratio","debasement"],d:"Pricing wages/homes/indices in gold-oz AND silver-oz at the time of measure. A US median wage fell ~7x in gold since 1998 — debasement a dollar-denominated CPI can't show."},
{t:"Formal verification (Z3 / TLA+ / Alloy)",c:"proof",a:["formal verification","z3","tla+","alloy","sat","unsat"],d:"Software that mathematically proves statements possible (SAT) or impossible (UNSAT). Used here to prove the core's circularity and capital dependence rather than assert them."},
{t:"Self-marked value",c:"proof",a:["self marked","self-marked value","marked value"],d:"A value the holder chooses and carries above its realizable level until a forcing event (bank HTM, AI fair-value, private-credit NAV, GPU useful-life, stablecoin AUM). The recurring defect."},
{t:"Reflexive marks",c:"proof",a:["reflexive marks","circular marks"],d:"When entities' asset values depend on each other's marks, so a markdown in one cascades — the marks reinforce each other on the way up and down."},
{t:"HTM vs AFS",c:"banking",a:["htm","afs","held to maturity","available for sale"],d:"How banks classify bonds: Held-to-Maturity (losses hidden until sold) vs Available-for-Sale (losses shown). Rising rates created large hidden HTM losses (the SVB failure mode)."},
{t:"AOCI filter",c:"banking",a:["aoci","aoci filter","opt-out"],d:"A Basel-III election letting non-advanced-approaches banks keep AFS losses OUT of regulatory capital — the rule that hid SVB's hole until the run forced realization."},
{t:"Private credit",c:"finance",a:["private credit","direct lending"],d:"Non-bank lending (Apollo, Blackstone, PIMCO). It became the marginal lender for AI data centers when banks pulled back; ~$1.7T+ and outside bank capital rules."},
{t:"NDFI / BDC",c:"finance",a:["ndfi","bdc","business development company","nonbank"],d:"Non-Depository Financial Institution / Business Development Company — the nonbank lenders banks fund (~$117B in 2024) to route credit around prudential capital limits."},
{t:"NAV / discount-to-NAV / PIK",c:"finance",a:["nav","discount to nav","pik","payment in kind"],d:"Net Asset Value (a fund's self-reported mark); trading below it (discount-to-NAV) signals doubt. PIK = interest paid in more debt, not cash — a distress tell."},
{t:"Special-purpose vehicle (SPV)",c:"finance",a:["spv","special purpose vehicle"],d:"A separate legal entity used to move assets/debt off a company's main balance sheet — the Enron structure, reused in AI-infra finance (Stargate, Meta-Hyperion/Blue Owl)."},
{t:"Treasury basis trade",c:"finance",a:["basis trade","treasury basis"],d:"A leveraged hedge-fund trade (~$1T) arbitraging cash Treasuries vs futures via repo. It can amplify a Treasury-market shock (the 2020 dash-for-cash)."},
{t:"SLR / eSLR",c:"banking",a:["slr","eslr","supplementary leverage ratio"],d:"The Supplementary Leverage Ratio — a non-risk-weighted bank capital constraint. Its 2025 relaxation frees dealer balance sheets to intermediate Treasuries (feeding the basis trade)."},
{t:"Carry trade (yen)",c:"macro",a:["carry trade","yen carry"],d:"Borrowing in a cheap currency (yen) to fund higher-yielding assets. A BOJ-driven unwind transmits into the AI core via yen-funded financiers like SoftBank."},
{t:"Volcker Rule",c:"regulation",a:["volcker","volcker rule","covered funds"],d:"Post-2008 limit on bank proprietary trading + fund sponsorship. The 2020 'Volcker 2.0' covered-funds loosening let banks back into VC/private-credit funds."},
{t:"ILC (industrial loan company)",c:"regulation",a:["ilc","industrial loan company"],d:"A bank charter exempt from Fed holding-company supervision (CEBA 1987), letting a commercial/fintech parent own an FDIC-insured bank outside the prudential perimeter."},
{t:"GENIUS Act",c:"regulation",a:["genius act","stablecoin law"],d:"The 2025 US stablecoin law (P.L. 119-27): 1:1 HQLA reserves + monthly disclosure. It turns stablecoin growth into mandated short-Treasury demand."},
{t:"CNSA 2.0 / Basel III Endgame",c:"regulation",a:["cnsa","basel iii","endgame","capital relief"],d:"NSA's quantum-safe deadline suite (2027/2030/2035); Basel III Endgame is the big-bank capital rule, proposed 2023 then rescinded + re-proposed weaker in 2026."},
{t:"Operation Chokepoint 2.0 / pause letters / debanking",c:"crypto",a:["chokepoint","pause letters","debanking"],d:"The FDIC's ~23 'pause letters' (Mar 2022-May 2023) discouraging banks from crypto. A FOIA fight (Coinbase) forced them out; a coordinated directive stays contested."},
{t:"PQC",c:"post-quantum",a:["pqc","post quantum cryptography"],d:"Post-Quantum Cryptography — algorithms believed safe against quantum attack. NIST standards: ML-KEM (203), ML-DSA (204), SLH-DSA (205), + HQC (backup KEM, 2025)."},
{t:"CRQC / Q-Day",c:"post-quantum",a:["crqc","q-day","qday","quantum computer"],d:"A Cryptographically-Relevant Quantum Computer — one able to break RSA/ECC (commonly projected ~2030 ±3). Q-Day is when it arrives; a first-mover's incentive is to keep it secret."},
{t:"Shor's algorithm",c:"post-quantum",a:["shor","shors algorithm"],d:"The quantum algorithm that derives a private key from a public key, breaking RSA and elliptic-curve crypto — the engine behind the whole post-quantum threat."},
{t:"Harvest-now-decrypt-later (HNDL)",c:"post-quantum",a:["hndl","harvest now decrypt later"],d:"Adversaries storing encrypted data TODAY to decrypt once a quantum computer exists. The loss to long-lived secrets is already incurred; only the decryption is deferred."},
{t:"Trust-now-forge-later (TNFL)",c:"post-quantum",a:["tnfl","trust now forge later","forge later"],d:"HNDL's integrity twin: once Shor breaks signatures, previously-issued credentials become forgeable — so a digital ID's authentication can be impersonated retroactively."},
{t:"ML-KEM / ML-DSA / SLH-DSA / HQC",c:"post-quantum",a:["ml-kem","mldsa","kyber","dilithium","sphincs","slh-dsa","hqc","fips 203","fips 204","fips 205"],d:"The NIST post-quantum standards: ML-KEM (Kyber, FIPS 203, key exchange), ML-DSA (Dilithium, 204) + SLH-DSA (SPHINCS+, 205) signatures, HQC (code-based backup KEM, 2025)."},
{t:"XMSS / Merkle signature",c:"post-quantum",a:["xmss","merkle","merkle tree","hash-based signature","qrl"],d:"A hash-based, post-quantum, forward-secure signature (RFC 8391; Merkle, 1979): a tree of one-time keys = a ratchet off a root. Stateful (never reuse a key); QRL is the first industrial use."},
{t:"Crypto-agility",c:"post-quantum",a:["crypto agility","crypto-agility","algorithm rotation"],d:"The ability to swap cryptographic algorithms without re-architecting. Physical ID cards have essentially none (rotation needs reissuance); a remotely-updatable digital ID has it (but updatable = controllable)."},
{t:"ROCA",c:"post-quantum",a:["roca","infineon flaw","estonia id"],d:"A 2017 Infineon-chip flaw that let RSA keys be recovered from public keys. Estonia suspended ~760k national ID cards and re-keyed them remotely — the 'your deployed ID's crypto can break' precedent."},
{t:"Zero-knowledge proof (ZKP) / zk-SNARK / zk-STARK",c:"crypto",a:["zkp","zero knowledge","snark","stark","zk"],d:"A proof you know/satisfy something without revealing the underlying data. Useful but not a panacea for digital ID — it doesn't remove enrollment PII, many schemes are quantum-fragile, and soundness can be forged."},
{t:"Blind signature (Chaum)",c:"crypto",a:["blind signature","chaum","ecash","digicash"],d:"David Chaum's 1982 primitive: a signer signs a message it can't see — the root of unlinkable anonymous credentials. The privacy-money idea predates Bitcoin by ~25 years (DigiCash failed first)."},
{t:"Anonymous credential / pseudonym system",c:"crypto",a:["anonymous credential","pseudonym","idemix","u-prove"],d:"A credential shown under different unlinkable pseudonyms (Chaum 1985; Idemix 2002, U-Prove 2004). 'Be yourself, unlinkably' — the engine of the antidote identity architecture."},
{t:"BBS+ signature",c:"crypto",a:["bbs+","bbs plus","bbs signature"],d:"A signature scheme enabling multi-show-unlinkable selective disclosure of verifiable credentials; being made eIDAS-2.0-compliant (2025)."},
{t:"Selective disclosure",c:"crypto",a:["selective disclosure","sd-jwt"],d:"Revealing only the minimum needed (prove 'over 18' without your birthdate). A privacy improvement at the presentation layer — but the issuer still holds the enrollment data."},
{t:"Decentralized identifier (DID) / pairwise DID",c:"identity",a:["did","pairwise did","ssi","self-sovereign identity"],d:"A user-controlled identifier not anchored in a central database; a PAIRWISE DID is a fresh unlinkable identifier per relationship — 'a different identity per verifier.'"},
{t:"Self-sovereign identity (SSI)",c:"identity",a:["ssi","self sovereign","verifiable credential"],d:"An identity model where the user holds their own credentials and discloses selectively, rather than a central authority holding the record. The decentralized alternative to the honeypot."},
{t:"Forward secrecy / ratchet",c:"crypto",a:["forward secrecy","ratchet","double ratchet"],d:"Key evolution so that compromising one key doesn't expose past/future ones (Signal's double ratchet). In the antidote design, a ratchet off a private root generates unlinkable identities."},
{t:"Pluralistic identity",c:"identity",a:["pluralistic identity","multiple identities","one-per-person"],d:"Buterin's design (zkID 2025): allow MULTIPLE unlinkable identities rather than enforcing one-per-person (which kills pseudonymity). Sized so you hold 'N identities at cost N²' to resist Sybil."},
{t:"Sybil attack",c:"crypto",a:["sybil","sybil attack","proof of personhood"],d:"Creating many fake identities to game a one-per-person system. The hard tension: unlimited unlinkable identities (privacy) vs provable uniqueness (anti-Sybil)."},
{t:"Proof-of-personhood",c:"identity",a:["proof of personhood","worldcoin","biometric id"],d:"A credential meant to prove an account is a unique human (e.g. Worldcoin's iris scan), pitched against AI bots — and a route to a global biometric identity layer."},
{t:"mDL (mobile driver's license) / REAL ID",c:"identity",a:["mdl","mobile drivers license","iso 18013-5","real id","pdf417"],d:"REAL ID's machine-readable part is an unsigned PDF417 barcode (no card-level crypto); the digital mDL (ISO 18013-5) is ECDSA-signed = classical, quantum-fragile. Neither is post-quantum."},
{t:"Domain separation / domain binding",c:"crypto",a:["domain separation","domain binding","context string"],d:"Making a key/signature valid only in its intended context (gov vs private), so a credential can't be replayed across domains. Formalized by NIST (SP 800-185; ML-DSA's context string)."},
{t:"N-of-M trust model",c:"crypto",a:["trust model","n-of-m","verify don't trust","0-of-n"],d:"Buterin's taxonomy: rank systems by how few honest actors they need. 0-of-N (verify yourself) is best; 1-of-1 (one trusted party) is worst. 'Verify, don't trust.'"},
{t:"Soulbound token (SBT)",c:"crypto",a:["soulbound","sbt"],d:"A non-transferable token representing a credential or affiliation (Buterin, 2022) — reputation/identity that can't be sold, unlike ordinary tokens."},
{t:"Info finance / futarchy",c:"crypto",a:["info finance","futarchy","prediction market"],d:"Buterin's generalization of prediction markets: financial incentives to elicit truthful information (and govern by it). His treatment under-addresses insider trading — the gap this project fills."},
{t:"Legitimacy (Buterin)",c:"governance",a:["legitimacy","scarce resource","zhengming","正名"],d:"Higher-order acceptance — the binding constraint on power and on deploying accumulated capital; abuse forfeits it. The theoretical anchor under the OpenAI moral-authority / 正名 analysis."},
{t:"Quadratic funding / voting",c:"governance",a:["quadratic funding","quadratic voting","gitcoin"],d:"A mechanism (Buterin/Weyl) that weights the NUMBER of contributors over the SIZE of contributions, to fund public goods without plutocracy."},
{t:"d/acc",c:"governance",a:["dacc","d/acc","defensive accelerationism"],d:"Buterin's 'defensive accelerationism': accelerate tech but differentially favor defense + decentralization + democratic control — between doomerism and unchecked, power-concentrating acceleration."},
{t:"Composition / division fallacy",c:"method",a:["composition fallacy","division fallacy","unitary agent"],d:"Composition: treating what's true of the parts as true of the whole (individuals' intent → 'the NSA wants'). Division: the reverse. Institutions are distributions, not minds — institutional ACTION ≠ institutional MIND."},
{t:"Evidence grading",c:"method",a:["evidence grading","fact contested weak","grading"],d:"Each non-proven claim is labeled fact / contested / weak / unsupported and kept out of the formal proofs. Intent is never inferred from association."},
{t:"Financial vs structural edge",c:"proof",a:["financial edge","structural edge","overlay"],d:"Graph links split into capital/credit/compute flows (financial) vs governance/legal/security/ownership (structural). The proven core rests only on the financial layer; structural edges are overlay."},
{t:"Cross-sectional analysis",c:"proof",a:["cross-sectional","cross section"],d:"Comparing many things at one moment (every credit-rating bucket today) rather than one over time — measuring dispersion, relative value, and co-movement."},
{t:"Common factor / PC1 share",c:"proof",a:["common factor","pc1","principal component","diversification"],d:"The fraction of joint variation explained by one shared driver (first principal component). High share (US credit ≈ 91%) means segments move as one — so spreading money across them does NOT diversify."},
{t:"Relative value (z-score)",c:"proof",a:["relative value","z-score","zscore"],d:"How far a price/yield sits from its own recent average, in standard deviations. Positive = unusually wide/cheap; negative = tight/rich. A desk tool for spotting mispricing."},
{t:"Useful life / depreciation",c:"finance",a:["useful life","depreciation","gpu life"],d:"The years a company spreads an asset's cost over — an estimate, not a price. A longer assumed life lowers each year's expense and inflates profit, deferring the cost (the GPU depreciation trap)."},
{t:"Duration mismatch",c:"finance",a:["duration mismatch","asset-liability"],d:"When an asset's economic life is shorter than the debt/lease financing it (~3-yr GPUs funded by 15-yr leases). The asset can be worthless while the loan is still owed."},
{t:"Idle-GPU / stranded asset",c:"finance",a:["idle gpu","stranded asset","stranded","power stranding"],d:"A GPU that can't be powered keeps accruing depreciation + carry with zero revenue — a stranded 100k-GB200 cluster burns ~$5M/day. The depreciation trap made physical."},
{t:"Rare earths / antimony / NdFeB",c:"commodities",a:["rare earths","antimony","ndfeb","magnets","critical minerals"],d:"Critical minerals China dominates (~90% REE processing; ~90% refined antimony). NdFeB are the permanent magnets in missiles/EVs/datacenters; the chokepoint under both AI and defense."},
{t:"Stablecoin",c:"crypto",a:["stablecoin","usdt","usdc","usd1"],d:"A crypto token pegged to a currency. GENIUS-Act rules route reserves into Treasuries (forced demand for govt debt). Most are censorable (admin freeze) and quantum-fragile."},
{t:"Censorability (stablecoin)",c:"crypto",a:["censorability","freeze function","blacklist"],d:"Whether an issuer can freeze a token: regulated coins (USDC, the Asian local-currency coins) have admin freeze + legal duty = highly censorable; USDT selective; DAI least (but inherits USDC's via reserves)."},
{t:"Chain analysis / deanonymization",c:"crypto",a:["chain analysis","chainalysis","deanonymization","public honeypot"],d:"Tracing a transparent ledger (Bitcoin) to link addresses to people. It makes a 'permissionless' chain a public, linkable graph — closer to a public honeypot than to private money."},
{t:"Stealth address",c:"crypto",a:["stealth address","one-time address"],d:"A one-time address derived so only sender and recipient can link it — on-chain unlinkability for payments (Buterin, 2023)."},
{t:"FARA",c:"influence",a:["fara","foreign agent","foreign influence"],d:"The Foreign Agents Registration Act: paying a US person to push a foreign principal's narrative without registering is a felony (the Tenet Media/RT precedent)."},
{t:"Pig butchering (sha zhu pan)",c:"crypto",a:["pig butchering","sha zhu pan","scam compound"],d:"Industrial forced-labor crypto-romance fraud run from SE-Asian compounds (Prince Group/Chen Zhi; Huione laundering). Proceeds also launder DPRK cyber-heist funds."},
{t:"PQC / CRQC / harvest-now-decrypt-later (combined)",c:"post-quantum",a:["pqc crqc hndl"],d:"See PQC, CRQC/Q-Day, and Harvest-now-decrypt-later above — the quantum threat (CRQC) + the defense (PQC) + the already-incurred loss (HNDL)."},
{t:"CALEA",c:"surveillance",a:["calea","wiretap","salt typhoon"],d:"The US law requiring telecom carriers to build wiretap access for law enforcement. China's Salt Typhoon breached exactly this mandated-backdoor system — 'you can't build access only good guys use.'"},
{t:"Spoofing",c:"finance",a:["spoofing","layering"],d:"Placing and rapidly canceling orders to move a price. JPMorgan paid ~$920M to settle spoofing of metals + Treasury futures."},
{t:"Digital Public Infrastructure (DPI)",c:"identity",a:["dpi","digital public infrastructure","aadhaar","india stack"],d:"Government 'rails' for identity, payments, and data (India's Aadhaar/UPI). Promoted by the World Bank/UN/G20; the foundation a digital-ID + programmable-money stack runs on."},
{t:"Programmable money / CBDC",c:"identity",a:["cbdc","programmable money","digital euro"],d:"A central-bank digital currency whose spending rules can be coded in. The BIS GM stated this gives the issuer 'absolute control … and the technology to enforce that.'"},
{t:"Supply-chain worm / token theft",c:"crypto",a:["supply chain worm","token theft","shai-hulud","npm worm"],d:"Malware that steals a developer's access tokens to publish poisoned software others trust (the Shai-Hulud npm worm). The prize is the trust attached to an identity, not a password."}
];
const $=id=>document.getElementById(id);
function norm(s){return (s||"").toLowerCase().replace(/[^a-z0-9+ ]/g,"").replace(/\s+/g," ").trim();}
// Levenshtein distance (capped) for typo-tolerant matching
function lev(a,b){if(a===b)return 0;const m=a.length,n=b.length;if(!m)return n;if(!n)return m;let prev=Array.from({length:n+1},(_,i)=>i),cur=new Array(n+1);
for(let i=1;i<=m;i++){cur[0]=i;for(let j=1;j<=n;j++){const cost=a[i-1]===b[j-1]?0:1;cur[j]=Math.min(prev[j]+1,cur[j-1]+1,prev[j-1]+cost);}[prev,cur]=[cur,prev];}return prev[n];}
function bestTokenSim(q,text){ // max similarity of q against any word (or sliding window) in text
  const words=text.split(" ");let best=0;
  for(const w of words){if(!w)continue;const d=lev(q,w);const sim=1-d/Math.max(q.length,w.length);if(sim>best)best=sim;
    if(w.startsWith(q))best=Math.max(best,0.92);}
  return best;}
function score(q,item){ // 0..1; substring beats fuzzy
  const t=norm(item.t),defs=norm(item.d),al=(item.a||[]).map(norm);
  const hay=[t,...al];
  if(t.includes(q))return 1;                         // term substring
  for(const a of al){if(a.includes(q))return 0.96;}  // alias substring
  if((" "+defs).includes(" "+q))return 0.75;          // definition word-start substring
  if(defs.includes(q))return 0.6;                     // definition substring
  const qt=q.split(" ").filter(Boolean);             // tokenize query for multi-word typo tolerance
  let agg=0; for(const tok of qt){let b=0;for(const h of hay)b=Math.max(b,bestTokenSim(tok,h));agg+=b;}
  const best=qt.length?agg/qt.length:0;              // avg per-query-token best Levenshtein sim
  return best>=0.62?0.3+0.4*best:0;                   // distance threshold ~0.62
}
function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function hl(s,q){if(!q)return esc(s);const i=s.toLowerCase().indexOf(q);if(i<0)return esc(s);return esc(s.slice(0,i))+"<mark>"+esc(s.slice(i,i+q.length))+"</mark>"+esc(s.slice(i+q.length));}
function render(){
  const raw=$("gq").value, q=norm(raw);
  let rows;
  if(!q){rows=G.map(x=>({x,s:1})).sort((a,b)=>a.x.t.localeCompare(b.x.t));}
  else{rows=G.map(x=>({x,s:score(q,x)})).filter(r=>r.s>0).sort((a,b)=>b.s-a.s||a.x.t.localeCompare(b.x.t));}
  $("gmeta").textContent = q ? rows.length+" match"+(rows.length===1?"":"es")+" for “"+raw.trim()+"”"+(rows.length?"":" — try fewer/looser letters") : G.length+" terms";
  $("glist").innerHTML = rows.map(({x})=>"<dt>"+hl(x.t,q)+"<span class=gcat>"+x.c+"</span></dt><dd>"+hl(x.d,q)+"</dd>").join("");
}
$("gq").addEventListener("input",render); render();
</script>
</body></html>
